<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP City - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-red: #ff3e3e;
            --logo-gold: #fcc201;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1a0000 0%, #000 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* --- شريط الأزرار العلوي (نفس الصورة) --- */
        .navbar {
            margin-top: 30px;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(15px);
            padding: 10px 30px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .navbar a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            transition: 0.3s;
            padding: 5px 10px;
        }

        .navbar a:hover {
            color: var(--logo-gold);
            text-shadow: 0 0 10px var(--logo-gold);
        }

        /* --- محتوى المنتصف --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo-wrapper {
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(255, 62, 62, 0.3));
        }

        .logo { 
            width: 320px; /* حجم الشعار المرفق */
            height: auto;
        }

        .welcome-text {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 10px 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            color: #888;
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.6;
        }

        /* --- زر الإدارة في الركن --- */
        .admin-corner {
            position: fixed;
            bottom: 15px;
            left: 15px;
        }

        .btn-admin-small { 
            background: transparent; 
            color: #222; 
            border: 1px solid #111; 
            padding: 4px 10px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-admin-small:hover { 
            color: var(--logo-red);
            border-color: var(--logo-red);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="rules.html">القوانين</a>
        <a href="apply.html">التقديمات</a>
        <a href="auctions.html">المزادات</a>
        <a href="sectors.html">القطاعات</a>
        <a href="prices.html">المتجر</a>
        <a href="support.html">الدعم الفني</a>
        <a href="about.html">تعريف</a> <a href="discord-link.html">ربط الديسكورد</a>
    </nav>

    <div class="main-content">
        <div class="logo-wrapper">
            <img src="logo.png" alt="RP City" class="logo"> 
        </div>
        
        <h1 class="welcome-text">مرحباً بك في RP City</h1>
        <p class="sub-text">
            عالم الواقعية والإبداع، حيث تبدأ قصتك الخاصة. 
            استكشف أفضل تجربة لعب في MTA:SA.
        </p>
    </div>

    <div class="admin-corner">
        <button onclick="checkAdmin()" class="btn-admin-small">🔐 ADMIN</button>
    </div>

    <script>
        function checkAdmin() {
            let pass = prompt("الرجاء إدخال كلمة السر الخاصة بالإدارة:");
            if (pass === "r8p9" || pass === "78942") { 
                window.location.href = "admin.html";
            } else {
                alert("بيانات الدخول خاطئة!");
            }
        }
    </script>

</body>
</html>
