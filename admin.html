<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الأقسام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-red-bright: #ff3e3e;
            --logo-red-dark: #b80000;
            --logo-gold: #fcc201;
            --black-bg: #000000;
        }

        body { 
            background-color: var(--black-bg);
            color: white; 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { color: var(--logo-gold); font-weight: 900; margin-bottom: 40px; }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .admin-card {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid var(--logo-red-dark);
            padding: 30px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .admin-card:hover {
            border-color: var(--logo-gold);
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 62, 62, 0.2);
        }

        .admin-card i { font-size: 2.5rem; color: var(--logo-gold); }
        .admin-card span { font-weight: 700; font-size: 1.2rem; }

        .back-home { margin-top: 50px; color: #555; text-decoration: none; transition: 0.3s; }
        .back-home:hover { color: var(--logo-red-bright); }
    </style>
</head>
<body>

    <h1>لوحة الإدارة</h1>

    <div class="admin-grid">
        <a href="add-rank.html" class="admin-card">
            <span style="font-size: 2rem;">➕</span>
            <span>إضافة رتبة جديدة</span>
        </a>

        <div class="admin-card" style="opacity: 0.5; cursor: not-allowed;">
            <span style="font-size: 2rem;">⚙️</span>
            <span>إعدادات المتجر (قريباً)</span>
        </div>
    </div>

    <a href="index.html" class="back-home">⇠ العودة للرئيسية</a>

</body>
</html>
