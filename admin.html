<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الإدارة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059; 
            --dark-gold: #8e6d2f;
            --red: #4a0000;
            --dark: #0d0d0d;
        }

        body { 
            background: radial-gradient(circle, var(--red) 0%, var(--dark) 100%);
            color: white; 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            padding: 40px; 
            margin: 0;
            min-height: 100vh;
        }
        
        .header-admin { 
            border-bottom: 2px solid var(--gold); 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
            display: inline-block;
        }

        h1 { color: var(--gold); font-weight: 900; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        /* زر فتح نموذج الإضافة المطور */
        .open-btn {
            background: linear-gradient(45deg, var(--gold), var(--dark-gold));
            color: #2e1a05; 
            border: none;
            padding: 18px 50px; 
            font-size: 1.3rem; 
            cursor: pointer; 
            border-radius: 50px;
            transition: 0.4s; 
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px auto;
        }

        .open-btn:hover { 
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px var(--gold);
        }

        /* حاوية حقول الإضافة الفخمة */
        #addSection {
            display: none; 
            margin: 30px auto; 
            background: rgba(26, 26, 26, 0.9);
            padding: 40px; 
            border-radius: 25px; 
            border: 1px solid var(--gold);
            max-width: 450px; 
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.15);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input {
            display: block; 
            width: 100%; 
            margin: 15px 0; 
            padding: 15px;
            border-radius: 10px; 
            border: 1px solid #444; 
            background: rgba(0,0,0,0.5); 
            color: white;
            font-size: 1rem; 
            text-align: center;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 10px var(--gold); }

        .file-label {
            display: block;
            margin: 10px 0;
            color: #aaa;
            font-size: 0.9rem;
        }

        .save-btn {
            background: var(--gold); 
            color: #2e1a05; 
            width: 100%;
            padding: 15px; 
            border: none; 
            cursor: pointer; 
            font-weight: 900;
            border-radius: 10px; 
            font-size: 1.2rem;
            transition: 0.3s;
            margin-top: 10px;
        }

        .save-btn:hover { background: #fff; transform: scale(1.02); }

        .status-msg { margin-top: 20px; color: var(--gold); font-weight: bold; }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #777;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header-admin">
        <h1>لوحة إدارة الرتب</h1>
        <p style="margin: 5px 0; color: #ddd;">تحكم في محتوى متجرك الملكي</p>
    </div>

    <br>

    <button class="open-btn" onclick="toggleAddSection()">
        <span>➕</span> إضافة رتبة وسعر جديد
    </button>

    <div id="addSection">
        <h3 style="margin-top:0; color: var(--gold); font-size: 1.5rem;">تفاصيل الرتبة</h3>
        
        <input type="text" id="rankName" placeholder="اسم الرتبة (مثل: VIP)">
        <input type="number" id="rankPrice" placeholder="السعر">
        
        <label class="file-label">تحميل صورة الرتبة من جهازك:</label>
        <input type="file" id="rankImg" accept="image/*">
        
        <button class="save-btn" onclick="saveData()">نشر في المتجر</button>
        <div id="status" class="status-msg"></div>
    </div>

    <br>
    <a href="index.html" class="back-link">⇠ خروج والعودة للرئيسية</a>

    <script>
        // --- بيانات السحابة (تم الحفاظ عليها كما طلبت) ---
        const BIN_ID = '69ada3a2d0ea881f40fcecda';
        const MASTER_KEY = '$2a$10$EVJpa1kkUQx4JG6CPhwT8eMpLADFaWQc7iR5SShpZRDJSGC2sThvi';

        function toggleAddSection() {
            const section = document.getElementById('addSection');
            if (section.style.display === "block") {
                section.style.display = "none";
            } else {
                section.style.display = "block";
            }
        }

        async function saveData() {
            const name = document.getElementById('rankName').value;
            const price = document.getElementById('rankPrice').value;
            const fileInput = document.getElementById('rankImg');
            const status = document.getElementById('status');

            if (!name || !price || !fileInput.files[0]) {
                alert("أكمل جميع الحقول أولاً!");
                return;
            }

            status.innerText = "⏳ جاري تحضير البيانات ونشرها...";

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const imgBase64 = reader.result;
                const newEntry = { name, price, image: imgBase64 };

                try {
                    const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': MASTER_KEY }
                    });
                    const currentJson = await getRes.json();
                    let updatedRanks = currentJson.record.ranks || [];

                    updatedRanks.push(newEntry);

                    const putRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': MASTER_KEY
                        },
                        body: JSON.stringify({ ranks: updatedRanks })
                    });

                    if (putRes.ok) {
                        status.innerText = "✅ تم النشر في صفحة شراء الرتب!";
                        setTimeout(() => {
                            document.getElementById('rankName').value = "";
                            document.getElementById('rankPrice').value = "";
                            toggleAddSection();
                            status.innerText = "";
                        }, 2500);
                    }
                } catch (error) {
                    status.innerText = "❌ خطأ: لم يتم الاتصال بالسحابة";
                }
            };
        }
    </script>
</body>
</html>
