<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الرتب - 𝐌𝐮𝐥𝐬𝐗 𝐍𝐞𝐭𝐖𝐨𝐫𝐤</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-red: #ff3e3e;
            --logo-gold: #fcc201;
            --black-bg: #000000;
        }
        body { background-color: var(--black-bg); color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .form-container { margin: 20px auto; background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 25px; border: 2px solid var(--logo-gold); max-width: 450px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; text-align: center; font-family: 'Cairo'; box-sizing: border-box; }
        .save-btn { background: var(--logo-gold); color: black; width: 100%; padding: 12px; border: none; cursor: pointer; font-weight: 900; border-radius: 10px; font-size: 1.1rem; transition: 0.3s; }
        .save-btn:hover { background: white; }
        
        /* قائمة الرتب */
        .ranks-list { margin: 30px auto; max-width: 500px; background: #0a0a0a; border-radius: 20px; padding: 20px; border: 1px solid #222; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .rank-info { text-align: right; }
        .rank-actions { display: flex; gap: 8px; }
        .btn-edit { background: #2563eb; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; }
        .btn-delete { background: var(--logo-red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; }
        
        .status-msg { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 id="formTitle" style="color: var(--logo-gold);">إضافة رتبة جديدة</h2>
        <input type="text" id="rankName" placeholder="اسم الرتبة">
        <input type="number" id="rankPrice" placeholder="السعر">
        <button id="submitBtn" class="save-btn" onclick="handleSave()">نشر الرتبة الآن</button>
        <div id="status" class="status-msg"></div>
    </div>

    <div class="ranks-list">
        <h3 style="color: var(--logo-gold); border-bottom: 2px solid var(--logo-gold); padding-bottom: 10px;">الرتب المنشورة حالياً</h3>
        <div id="ranksContainer">⏳ جاري تحميل الرتب...</div>
    </div>

    <script>
        const BIN_ID = '69ade71aae596e708f6dff7c';
        const MASTER_KEY = '$2a$10$Jf/BiNPPOdt.TS.NNvTT4ulP.k61hphv8OM/8yArTGHP5F.MU/FSq';
        let allRanks = [];
        let editIndex = -1;

        async function fetchRanks() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                allRanks = data.record.ranks || [];
                renderRanks();
            } catch (e) { document.getElementById('ranksContainer').innerText = "فشل تحميل البيانات"; }
        }

        function renderRanks() {
            const container = document.getElementById('ranksContainer');
            if (allRanks.length === 0) { container.innerText = "لا توجد رتب حالياً"; return; }
            
            container.innerHTML = allRanks.map((rank, index) => `
                <div class="rank-item">
                    <div class="rank-info">
                        <strong>${rank.name}</strong> <br> 
                        <span style="color: #888; font-size: 13px;">${rank.price} ريال</span>
                    </div>
                    <div class="rank-actions">
                        <button class="btn-edit" onclick="prepareEdit(${index})">تعديل</button>
                        <button class="btn-delete" onclick="deleteRank(${index})">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        async function handleSave() {
            const name = document.getElementById('rankName').value;
            const price = document.getElementById('rankPrice').value;
            if (!name || !price) return alert("أكمل البيانات!");

            document.getElementById('status').innerText = "⏳ جاري الحفظ...";
            
            if (editIndex > -1) {
                allRanks[editIndex] = { name, price };
            } else {
                allRanks.push({ name, price });
            }

            await updateCloud();
        }

        async function deleteRank(index) {
            if (!confirm("هل أنت متأكد من حذف هذه الرتبة؟")) return;
            allRanks.splice(index, 1);
            await updateCloud();
        }

        function prepareEdit(index) {
            editIndex = index;
            document.getElementById('rankName').value = allRanks[index].name;
            document.getElementById('rankPrice').value = allRanks[index].price;
            document.getElementById('formTitle').innerText = "تعديل رتبة";
            document.getElementById('submitBtn').innerText = "حفظ التعديلات";
            window.scrollTo(0,0);
        }

        async function updateCloud() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                    body: JSON.stringify({ ranks: allRanks })
                });
                if (res.ok) {
                    document.getElementById('status').innerText = "✅ تم التحديث بنجاح!";
                    resetForm();
                    fetchRanks();
                }
            } catch (e) { alert("حدث خطأ في الاتصال"); }
        }

        function resetForm() {
            editIndex = -1;
            document.getElementById('rankName').value = "";
            document.getElementById('rankPrice').value = "";
            document.getElementById('formTitle').innerText = "إضافة رتبة جديدة";
            document.getElementById('submitBtn').innerText = "نشر الرتبة الآن";
        }

        window.onload = fetchRanks;
    </script>
</body>
</html>
