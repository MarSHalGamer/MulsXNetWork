<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP City - Minecraft Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-red: #ff3e3e;
            --logo-gold: #fcc201;
            --glass-bg: rgba(15, 15, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1a0000 0%, #000 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* --- شريط الأزرار المختصر --- */
        .navbar {
            margin-top: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 10px 40px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 25px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .navbar a, .navbar button {
            color: #eee;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }

        .navbar a:hover, .navbar button:hover {
            color: var(--logo-gold);
            text-shadow: 0 0 10px var(--logo-gold);
        }

        /* --- محتوى المنتصف --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo-wrapper {
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(255, 62, 62, 0.4));
        }

        .logo { 
            width: 320px;
            height: auto;
        }

        .welcome-text {
            font-size: 3rem;
            font-weight: 900;
            margin: 10px 0;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            color: #aaa;
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
        }

        /* رسالة التنبيه عند النسخ */
        #copyToast {
            position: fixed;
            top: 100px;
            background: var(--logo-red);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
            display: none;
            z-index: 200;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* --- زر الإدارة --- */
        .admin-corner {
            position: fixed;
            bottom: 15px;
            left: 15px;
        }

        .btn-admin-small { 
            background: transparent; 
            color: #222; 
            border: 1px solid #111; 
            padding: 4px 10px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="copyToast">✅ تم نسخ رابط الديسكورد!</div>

    <nav class="navbar">
        <a href="about.html">تعريف</a>
        <a href="prices.html">المتجر</a>
        <button onclick="copyDiscordLink()">ربط الديسكورد</button>
    </nav>

    <div class="main-content">
        <div class="logo-wrapper">
            <img src="logo.png" alt="RP City Minecraft" class="logo"> 
        </div>
        
        <h1 class="welcome-text">مرحباً بك في RP City</h1>
        <p class="sub-text">
            أقوى سيرفر ماين كرافت بنظام واقعي فريد. 
            ابنِ إمبراطوريتك الخاصة الآن في عالمنا.
        </p>
    </div>

    <div class="admin-corner">
        <button onclick="checkAdmin()" class="btn-admin-small">🔐 ADMIN</button>
    </div>

    <script>
        // ضع رابط الديسكورد الخاص بك هنا
        const DISCORD_URL = "https://discord.gg/yourlink";

        function copyDiscordLink() {
            navigator.clipboard.writeText(DISCORD_URL).then(() => {
                const toast = document.getElementById("copyToast");
                toast.style.display = "block";
                setTimeout(() => {
                    toast.style.display = "none";
                }, 2000);
            });
        }

        function checkAdmin() {
            let pass = prompt("الرجاء إدخال كلمة السر الخاصة بالإدارة:");
            if (pass === "r8p9" || pass === "78942") { 
                window.location.href = "admin.html";
            } else {
                alert("بيانات الدخول خاطئة!");
            }
        }
    </script>

</body>
</html>
