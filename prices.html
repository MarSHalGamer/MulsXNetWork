<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شراء الرتب</title>
    <style>
        :root { --gold: #d4af37; --red: #8b0000; }
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { border: 1px solid var(--gold); background: #1a1a1a; padding: 20px; border-radius: 10px; width: 200px; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 0 15px var(--gold); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; border-bottom: 2px solid var(--gold); }
        .card h3 { color: var(--gold); margin: 15px 0 5px; }
        .card p { font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1 style="color: var(--gold);">قائمة الرتب المتاحة</h1>
    <div id="ranksGrid" class="grid">جاري تحميل الرتب...</div>

    <script>
        // --- بيانات السحابة (يجب أن تكون نفس التي في صفحة الآدمن) ---
        const BIN_ID = '69ada3a2d0ea881f40fcecda';
        const MASTER_KEY = '$2a$10$EVJpa1kkUQx4JG6CPhwT8eMpLADFaWQc7iR5SShpZRDJSGC2sThvi';

        async function loadRanks() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const result = await response.json();
                const ranks = result.record.ranks || [];
                const grid = document.getElementById('ranksGrid');
                grid.innerHTML = "";

                ranks.forEach(rank => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${rank.image}" alt="Rank Image">
                            <h3>${rank.name}</h3>
                            <p>${rank.price} ريال</p>
                            <button style="width:100%; background:var(--red); color:white; border:none; padding:5px; cursor:pointer;">شراء الآن</button>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('ranksGrid').innerText = "خطأ في تحميل البيانات";
            }
        }
        loadRanks();
    </script>
</body>
</html>
