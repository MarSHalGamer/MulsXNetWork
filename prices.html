<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الرتب الملكي - شراء الرتب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059; 
            --dark-gold: #8e6d2f;
            --red: #4a0000;
            --bright-red: #8b0000;
            --dark: #0d0d0d;
        }

        body { 
            background: radial-gradient(circle, var(--red) 0%, var(--dark) 100%);
            color: white; 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        h1 { 
            color: var(--gold); 
            font-weight: 900; 
            font-size: 2.5rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ddd;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            margin-top: 20px; 
        }

        /* تصميم كرت الرتبة الفخم */
        .card { 
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid var(--gold); 
            padding: 15px; 
            border-radius: 20px; 
            width: 260px; 
            transition: all 0.4s ease; 
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card:hover { 
            transform: translateY(-15px); 
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.3);
            border-color: #fff;
        }

        .card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 15px; 
            border-bottom: 3px solid var(--gold); 
            transition: 0.3s;
        }

        .card h3 { 
            color: var(--gold); 
            margin: 20px 0 10px; 
            font-size: 1.6rem;
            font-weight: 900;
        }

        .card p { 
            font-weight: 700; 
            font-size: 1.4rem; 
            margin: 0 0 20px;
            color: #fff;
        }

        /* زر الشراء الملكي */
        .buy-btn {
            width: 100%; 
            background: linear-gradient(45deg, var(--gold), var(--dark-gold));
            color: #2e1a05; 
            border: none; 
            padding: 12px; 
            cursor: pointer;
            font-weight: 900;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            border-radius: 10px;
            transition: 0.3s;
        }

        .buy-btn:hover {
            filter: brightness(1.2);
            letter-spacing: 1px;
        }

        .back-home {
            display: inline-block;
            margin-top: 50px;
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-home:hover { color: var(--gold); }

        /* رسالة التحميل */
        #status-msg {
            font-size: 1.2rem;
            color: var(--gold);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>قائمة الرتب المتاحة</h1>
    <p class="subtitle">اختر رتبتك الآن وانضم إلى صفوة اللاعبين</p>

    <div id="ranksGrid" class="grid">
        <div id="status-msg">⏳ جاري تحميل الرتب الملكية...</div>
    </div>

    <a href="index.html" class="back-home">⇠ العودة للصفحة الرئيسية</a>

    <script>
        // --- بيانات السحابة (تم الحفاظ عليها) ---
        const BIN_ID = '69ade71aae596e708f6dff7c';
        const MASTER_KEY = '$2a$10$Jf/BiNPPOdt.TS.NNvTT4ulP.k61hphv8OM/8yArTGHP5F.MU/FSq';

        async function loadRanks() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const result = await response.json();
                const ranks = result.record.ranks || [];
                const grid = document.getElementById('ranksGrid');
                
                if (ranks.length === 0) {
                    grid.innerHTML = "<p>لا توجد رتب معروضة حالياً.</p>";
                    return;
                }

                grid.innerHTML = "";

                ranks.forEach(rank => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${rank.image}" alt="${rank.name}">
                            <h3>${rank.name}</h3>
                            <p>${rank.price} ريال</p>
                            <button class="buy-btn" onclick="orderRank('${rank.name}')">شراء الآن</button>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('ranksGrid').innerHTML = "<p>❌ عذراً، تعذر تحميل الرتب حالياً.</p>";
            }
        }

        function orderRank(name) {
            alert("لقد اخترت شراء رتبة: " + name + "\nسيتم توجيهك لإتمام العملية قريباً.");
        }

        loadRanks();
    </script>
</body>
</html>
