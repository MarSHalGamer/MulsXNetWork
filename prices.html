<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الرتب - 𝐌𝐮𝐥𝐬𝐗 𝐍𝐞𝐭𝐖𝐨𝐫𝐤</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #fcc201; 
            --dark-gold: #c69c3a;
            --red: #ff3e3e;
            --dark-red: #1a0000;
            --black: #000000;
        }

        body { 
            background: radial-gradient(circle at center, var(--dark-red) 0%, var(--black) 100%);
            color: white; 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        h1 { 
            color: var(--gold); 
            font-weight: 900; 
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(252, 194, 1, 0.4);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 50px;
            font-size: 1.1rem;
        }

        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 30px; 
            margin-top: 20px; 
        }

        .card { 
            background: rgba(15, 15, 15, 0.8);
            border: 2px solid var(--gold); 
            padding: 30px 20px; 
            border-radius: 25px; 
            width: 280px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(15px);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 40px rgba(252, 194, 1, 0.2);
            border-color: #fff;
        }

        .card::before {
            content: "RANK";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: black;
            padding: 2px 15px;
            font-size: 12px;
            font-weight: 900;
            border-radius: 5px;
        }

        .card h3 { 
            color: white; 
            margin: 10px 0; 
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .price-tag { 
            font-weight: 700; 
            font-size: 1.6rem; 
            margin-bottom: 25px;
            color: var(--gold);
        }

        .buy-btn {
            width: 100%; 
            background: linear-gradient(45deg, var(--gold), var(--dark-gold));
            color: #000; 
            border: none; 
            padding: 14px; 
            cursor: pointer;
            font-weight: 900;
            font-family: 'Cairo', sans-serif;
            font-size: 1.2rem;
            border-radius: 15px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(252, 194, 1, 0.3);
        }

        .buy-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 8px 20px var(--gold);
        }

        .back-home {
            display: inline-block;
            margin-top: 60px;
            color: #666;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-home:hover { color: var(--gold); }

        #status-msg {
            font-size: 1.2rem;
            color: var(--gold);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>متجر الرتب</h1>
    <p class="subtitle">استمتع بمميزات حصرية داخل سيرفر 𝐌𝐮𝐥𝐬𝐗 𝐍𝐞𝐭𝐖𝐨𝐫𝐤</p>

    <div id="ranksGrid" class="grid">
        <div id="status-msg">⏳ جاري جلب الرتب المتاحة...</div>
    </div>

    <a href="index.html" class="back-home">⇠ العودة للرئيسية</a>

    <script>
        const BIN_ID = '69ade71aae596e708f6dff7c';
        const MASTER_KEY = '$2a$10$Jf/BiNPPOdt.TS.NNvTT4ulP.k61hphv8OM/8yArTGHP5F.MU/FSq';
        const MY_PURCHASE_LINK = "https://discord.gg/sEdrrd2TJY"; 

        async function loadRanks() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const result = await response.json();
                
                // جلب العملة من الإعدادات أو استخدام "ريال" كافتراضي
                const currency = result.record.settings?.currency || "ريال";
                const ranks = result.record.ranks || [];
                const grid = document.getElementById('ranksGrid');
                
                if (ranks.length === 0) {
                    grid.innerHTML = "<p style='color:#888;'>لا توجد رتب معروضة حالياً.</p>";
                    return;
                }

                grid.innerHTML = "";

                ranks.forEach(rank => {
                    grid.innerHTML += `
                        <div class="card">
                            <h3>${rank.name}</h3>
                            <div class="price-tag">${rank.price} ${currency}</div>
                            <button class="buy-btn" onclick="orderRank()">امتلكها الآن</button>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('ranksGrid').innerHTML = "<p>❌ فشل تحميل الرتب، تأكد من الاتصال.</p>";
            }
        }

        function orderRank() {
            window.location.href = MY_PURCHASE_LINK;
        }

        window.onload = loadRanks;
    </script>
</body>
</html>
