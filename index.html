<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الرتب الملكي</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-red: #8b0000;
            --bright-red: #ff0000;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0b0b0b;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            border: 2px solid var(--gold);
            padding: 50px;
            background: linear-gradient(145deg, #1a1a1a, var(--dark-red));
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        h1 { color: var(--gold); font-size: 2.5em; text-shadow: 2px 2px 4px #000; }
        .logo { width: 150px; margin-bottom: 20px; border-radius: 50%; border: 3px solid var(--gold); }
        .btn-group { display: flex; gap: 20px; margin-top: 30px; justify-content: center; }
        .btn {
            padding: 12px 30px;
            font-size: 1.1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-buy { background-color: var(--gold); color: #000; }
        .btn-buy:hover { background-color: #fff; box-shadow: 0 0 15px var(--gold); }
        .btn-admin { background-color: transparent; color: var(--gold); border: 1px solid var(--gold); }
        .btn-admin:hover { background-color: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="الشعار" class="logo"> 
        <h1>لوحة التحكم الملكية</h1>
        <p>مرحباً بك في عالم التميز</p>

        <div class="btn-group">
            <a href="prices.html" class="btn btn-buy">شراء رتب</a>
            <button onclick="checkAdmin()" class="btn btn-admin">خاص بالادمنز</button>
        </div>
    </div>

    <script>
        function checkAdmin() {
            let pass = prompt("الرجاء إدخال كلمة السر:");
            if (pass === "1234") { // غير كلمة السر من هنا
                window.location.href = "admin.html";
            } else {
                alert("كلمة سر خاطئة!");
            }
        }
    </script>

</body>
</html>
