<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الرتب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-red-bright: #ff3e3e;
            --logo-red-dark: #b80000;
            --logo-gold: #fcc201;
            --black-bg: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1a0000 0%, var(--black-bg) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .logo-wrapper {
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px rgba(255, 62, 62, 0.4));
        }

        .logo { 
            width: 280px;
            height: auto;
        }

        .btn-buy {
            padding: 18px 70px;
            font-size: 1.4em;
            cursor: pointer;
            border-radius: 50px;
            font-weight: 900;
            transition: all 0.4s ease;
            text-decoration: none;
            background: linear-gradient(45deg, var(--logo-red-dark), var(--logo-red-bright));
            color: #fff; 
            border: 2px solid var(--logo-gold);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            box-shadow: 0 10px 30px rgba(184, 0, 0, 0.4);
            text-align: center;
        }
        
        .btn-buy:hover { 
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 62, 62, 0.6);
        }

        /* زر الأدمن في الركن السفلي الأيسر */
        .admin-corner {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 10;
        }

        .btn-admin-small { 
            background: transparent; 
            color: #333; 
            border: 1px solid #222; 
            padding: 5px 12px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            opacity: 0.5;
        }

        .btn-admin-small:hover { 
            opacity: 1;
            color: var(--logo-red-bright);
            border-color: var(--logo-red-bright);
        }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <img src="logo.png" alt="شعار المتجر" class="logo"> 
    </div>

    <div class="btn-group">
        <a href="prices.html" class="btn-buy">شراء الرتب</a>
    </div>

    <div class="admin-corner">
        <button onclick="checkAdmin()" class="btn-admin-small">🔐 الإدارة</button>
    </div>

    <script>
        function checkAdmin() {
            let pass = prompt("الرجاء إدخال كلمة السر:");
            if (pass === "r8p9" || pass === "78942") { 
                window.location.href = "admin.html";
            } else {
                alert("كلمة سر خاطئة!");
            }
        }
    </script>

</body>
</html>
