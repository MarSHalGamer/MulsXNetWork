<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الرتب الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* درجة ذهبي ملكي أعمق */
            --gold: #c5a059; 
            --dark-gold: #8e6d2f;
            --dark-red: #4a0000;
            --black-bg: #0d0d0d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            /* تلوين الصفحة كاملة بتدرج ملكي */
            background: radial-gradient(circle, var(--dark-red) 0%, var(--black-bg) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            /* جعل الحاوية بدون حدود بيضاء، فقط وهج ذهبي */
            padding: 60px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--gold);
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 { 
            color: var(--gold); 
            font-size: 3em; 
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.2em;
            color: #e0e0e0;
            margin-bottom: 40px;
        }

        .logo { 
            width: 160px; 
            margin-bottom: 25px; 
            border-radius: 50%; 
            border: 4px solid var(--gold); 
            box-shadow: 0 0 15px var(--gold);
        }

        .btn-group { 
            display: flex; 
            flex-direction: column; /* توزيع الازرار بشكل عمودي يعطي فخامة أكثر */
            gap: 15px; 
            align-items: center;
        }

        .btn {
            padding: 14px 50px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.4s ease;
            text-decoration: none;
            width: 200px;
            text-align: center;
        }

        /* زر شراء الرتب: ذهبي كامل */
        .btn-buy { 
            background: linear-gradient(45deg, var(--gold), var(--dark-gold));
            color: #2e1a05; 
            border: none;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4);
        }
        
        .btn-buy:hover { 
            transform: scale(1.05);
            box-shadow: 0 6px 20px var(--gold);
            filter: brightness(1.1);
        }

        /* زر خاص بالادمن: شفاف بحدود ذهبية */
        .btn-admin { 
            background-color: transparent; 
            color: var(--gold); 
            border: 2px solid var(--gold); 
        }

        .btn-admin:hover { 
            background-color: rgba(197, 160, 89, 0.1);
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="الشعار" class="logo"> 
        <h1>لوحة التحكم الملكية</h1>
        <p>مرحباً بك في عالم التميز</p>

        <div class="btn-group">
            <a href="prices.html" class="btn btn-buy">شراء رتب</a>
            <button onclick="checkAdmin()" class="btn btn-admin">خاص بالادمنز</button>
        </div>
    </div>

    <script>
        function checkAdmin() {
            let pass = prompt("الرجاء إدخال كلمة السر الخاصة بالإدارة:");
            if (pass === "1234") { 
                window.location.href = "admin.html";
            } else {
                alert("كلمة سر خاطئة! الدخول للمخولين فقط.");
            }
        }
    </script>

</body>
</html>
