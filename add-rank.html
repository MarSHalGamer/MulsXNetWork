<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة رتبة جديدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-red-bright: #ff3e3e;
            --logo-red-dark: #b80000;
            --logo-gold: #fcc201;
            --black-bg: #000000;
        }

        body { 
            background-color: var(--black-bg);
            color: white; 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }

        .form-container {
            margin: 50px auto; 
            background: rgba(20, 20, 20, 0.95);
            padding: 40px; 
            border-radius: 30px; 
            border: 2px solid var(--logo-gold);
            max-width: 450px; 
            box-shadow: 0 0 30px rgba(252, 194, 1, 0.1);
        }

        input {
            display: block; width: 100%; margin: 15px 0; padding: 15px;
            border-radius: 12px; border: 1px solid #333; background: #000; 
            color: white; text-align: center; font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--logo-red-bright); outline: none; }

        .save-btn {
            background: var(--logo-gold); color: black; width: 100%;
            padding: 15px; border: none; cursor: pointer; font-weight: 900;
            border-radius: 12px; font-size: 1.2rem; transition: 0.3s;
        }

        .save-btn:hover { background: white; transform: scale(1.02); }

        .status-msg { margin-top: 20px; color: var(--logo-gold); font-weight: bold; }

        .back-link { display: inline-block; margin-top: 30px; color: #555; text-decoration: none; }
        .back-link:hover { color: var(--logo-gold); }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 style="color: var(--logo-gold);">إضافة رتبة للمتجر</h2>
        
        <input type="text" id="rankName" placeholder="اسم الرتبة">
        <input type="number" id="rankPrice" placeholder="السعر بالريال">
        
        <p style="color: #888; font-size: 0.9rem;">اختر صورة الرتبة:</p>
        <input type="file" id="rankImg" accept="image/*">
        
        <button class="save-btn" onclick="saveData()">نشر الرتبة الآن</button>
        <div id="status" class="status-msg"></div>
        
        <a href="admin.html" class="back-link">⇠ العودة للوحة الإدارة</a>
    </div>

    <script>
        const BIN_ID = '69ada3a2d0ea881f40fcecda';
        const MASTER_KEY = '$2a$10$EVJpa1kkUQx4JG6CPhwT8eMpLADFaWQc7iR5SShpZRDJSGC2sThvi';

        async function saveData() {
            const name = document.getElementById('rankName').value;
            const price = document.getElementById('rankPrice').value;
            const fileInput = document.getElementById('rankImg');
            const status = document.getElementById('status');

            if (!name || !price || !fileInput.files[0]) {
                alert("يرجى إكمال الحقول!"); return;
            }

            status.innerText = "⏳ جاري الرفع...";
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const imgBase64 = reader.result;
                const newEntry = { name, price, image: imgBase64 };

                try {
                    const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': MASTER_KEY }
                    });
                    const currentJson = await getRes.json();
                    let updatedRanks = currentJson.record.ranks || [];
                    updatedRanks.push(newEntry);

                    const putRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                        body: JSON.stringify({ ranks: updatedRanks })
                    });

                    if (putRes.ok) {
                        status.innerText = "✅ تم النشر بنجاح!";
                        setTimeout(() => { window.location.href = "admin.html"; }, 2000);
                    }
                } catch (error) { status.innerText = "❌ فشل الاتصال"; }
            };
        }
    </script>
</body>
</html>
